<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Chitvel Planner</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://unpkg.com/konva@8/konva.min.js"></script>
  </head>
  <body>
    <div id="toolbar">
      <button id="add-house">Add House</button>
      <button id="save-all">Save All</button>
      <span>Tip: click a shape to edit properties; drag/resize with handles.</span>
    </div>
    <div id="container-wrapper">
      <div id="container"></div>
      <aside id="editor" class="hidden">
        <h3>House Editor</h3>
        <label>Label
          <input id="obj-label" type="text" placeholder="House name or number" />
        </label>
        <label>Width (pixels)
          <input id="obj-width" type="number" min="10" />
        </label>
        <label>Height (pixels)
          <input id="obj-height" type="number" min="10" />
        </label>
        <div class="editor-actions">
          <button id="save-btn">Save</button>
          <button id="delete-btn">Delete</button>
          <button id="close-btn">Close</button>
        </div>
      </aside>
    </div>
    <script src="/static/app_simple.js"></script>
  </body>
</html>
